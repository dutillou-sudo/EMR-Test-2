<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR — Effort · Motivation · Réussite</title>
<style>
/* ================================================================
   EMR — VARIABLES & RESET
   ================================================================ */
:root {
  --g: #1DB97A; --g2: #0F8A58; --gl: #E2F7EE; --gm: #A8E6CC;
  --p: #5B4FD6; --p2: #3D32B5; --pl: #EDEAFF; --pm: #B8B1F0;
  --pk: #E0456A; --pkl: #FDEAEE; --pkm: #F5A4B5;
  --a: #F59E0B; --al: #FEF3C7; --am: #FCD28A;
  --b: #3B82F6; --bl: #EFF6FF; --bm: #93C5FD;
  --bg: #F4F5FA; --white: #FFFFFF;
  --t1: #111827; --t2: #374151; --t3: #6B7280; --t4: #9CA3AF;
  --br: #E5E7EB; --br2: #D1D5DB;
  --r: 14px; --r2: 10px; --r3: 6px;
  --sh: 0 2px 16px rgba(0,0,0,.07);
  --sh2: 0 8px 32px rgba(0,0,0,.12);
  --fw: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --sidebar: 248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--fw);background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none;color:var(--t1)}
/* ----------------------------------------------------------------
   UTILITAIRES
   ---------------------------------------------------------------- */
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}
.items-c{align-items:center}.items-s{align-items:flex-start}
.just-b{justify-content:space-between}.just-c{justify-content:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap24{gap:24px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mt16{margin-top:16px}.mt24{margin-top:24px}.mt32{margin-top:32px}
.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}
.w100{width:100%}.fw7{font-weight:700}.fw8{font-weight:800}.fw6{font-weight:600}
.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}
.fs14{font-size:14px}.fs16{font-size:16px}.fs20{font-size:20px}.fs24{font-size:24px}
.tc{text-align:center}
.muted{color:var(--t3)}.small{font-size:12px;color:var(--t3)}
.upper{text-transform:uppercase;letter-spacing:.6px}
.ellipsis{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pointer{cursor:pointer}

/* ----------------------------------------------------------------
   BADGES & PILLS
   ---------------------------------------------------------------- */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.pill-g{background:var(--gl);color:var(--g2)}
.pill-p{background:var(--pl);color:var(--p)}
.pill-a{background:var(--al);color:#92400E}
.pill-pk{background:var(--pkl);color:#9B1239}
.pill-b{background:var(--bl);color:#1D4ED8}
.pill-grey{background:#F3F4F6;color:var(--t3)}

/* ----------------------------------------------------------------
   BOUTONS
   ---------------------------------------------------------------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
     padding:9px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;
     transition:all .15s;border:none}
.btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--p2)}
.btn-green{background:var(--g);color:#fff}.btn-green:hover{background:var(--g2)}
.btn-outline{background:#fff;color:var(--t1);border:1.5px solid var(--br)}.btn-outline:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--t2);border:none}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:#FEE2E2;color:#991B1B}.btn-danger:hover{background:#FECACA}
.btn-amber{background:var(--al);color:#92400E}.btn-amber:hover{background:var(--am)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r3)}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ----------------------------------------------------------------
   CARDS
   ---------------------------------------------------------------- */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--br);padding:20px;box-shadow:var(--sh)}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--t3)}
.card-sm{padding:14px 16px}

/* ----------------------------------------------------------------
   FORMS
   ---------------------------------------------------------------- */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--t2)}
.form-ctrl{width:100%;padding:9px 13px;border:1.5px solid var(--br);border-radius:var(--r2);
           font-size:14px;background:var(--white);transition:border-color .15s}
.form-ctrl:focus{border-color:var(--p)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ----------------------------------------------------------------
   PROGRESS BARS
   ---------------------------------------------------------------- */
.pbar-wrap{height:9px;background:var(--bg);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.pbar-wrap.thin{height:5px}
.pbar-wrap.thick{height:14px}

/* ================================================================
   LOGIN
   ================================================================ */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#EDE9FF 0%,#E0F7EE 50%,#FEF3E2 100%)}
.login-wrap{background:var(--white);border-radius:20px;padding:44px 40px;
  width:100%;max-width:420px;box-shadow:var(--sh2)}
.login-brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.login-badge{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--g));
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;letter-spacing:-1px}
.login-brand-text .t1{font-size:24px;font-weight:800;letter-spacing:-1px}
.login-brand-text .t2{font-size:12px;color:var(--t3)}
.login-h{font-size:20px;font-weight:800;text-align:center;margin-bottom:6px}
.login-s{font-size:13px;color:var(--t3);text-align:center;margin-bottom:28px}
.login-hint{font-size:11px;color:var(--t4);text-align:center;margin-top:18px;line-height:1.7}
.login-err{color:#dc2626;font-size:13px;text-align:center;margin-top:10px}

/* ================================================================
   APP SHELL
   ================================================================ */
#app{display:flex;min-height:100vh}

/* ================================================================
   SIDEBAR
   ================================================================ */
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--br);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;
  transition:width .2s}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--br)}
.sb-badge{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--p),var(--g));
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.sb-brand-text .t1{font-size:15px;font-weight:800}
.sb-brand-text .t2{font-size:10px;color:var(--t3)}
.sb-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;
  letter-spacing:.8px;padding:10px 10px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r2);
  font-size:14px;font-weight:500;color:var(--t2);background:none;border:none;
  cursor:pointer;width:100%;text-align:left;transition:all .12s;white-space:nowrap}
.nav-btn:hover{background:var(--bg);color:var(--t1)}
.nav-btn.active{background:var(--pl);color:var(--p);font-weight:700}
.nav-btn .nicon{width:22px;text-align:center;font-size:17px;flex-shrink:0}
.nav-btn .nbadge{margin-left:auto;background:var(--pk);color:#fff;font-size:10px;
  font-weight:700;padding:1px 6px;border-radius:99px}
.sb-footer{padding:14px;border-top:1px solid var(--br)}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.sb-user-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:var(--t3)}

/* ================================================================
   MAIN
   ================================================================ */
.main{margin-left:var(--sidebar);flex:1;padding:28px;min-height:100vh}
.page-header{margin-bottom:28px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.page-sub{font-size:14px;color:var(--t3);margin-top:4px}

/* ================================================================
   GRIDS
   ================================================================ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ================================================================
   STAT CARDS
   ================================================================ */
.stat-card{padding:18px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:20px;margin-bottom:12px}
.stat-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:12px;color:var(--t3);font-weight:600;margin-top:3px}
.stat-prog{margin-top:10px}

/* ================================================================
   TABLE
   ================================================================ */
.data-table{width:100%;border-collapse:collapse;font-size:14px}
.data-table th{text-align:left;padding:9px 14px;background:var(--bg);font-size:11px;
  font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;
  border-bottom:1px solid var(--br)}
.data-table td{padding:11px 14px;border-bottom:1px solid var(--br);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:#FAFBFF}

/* ================================================================
   MODAL
   ================================================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:var(--r);padding:28px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;
  cursor:pointer;font-size:16px;color:var(--t3);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--br)}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;
  border-top:1px solid var(--br)}

/* ================================================================
   EXERCICE RUNNER
   ================================================================ */
.ex-card{background:var(--white);border-radius:var(--r);border:1px solid var(--br);overflow:hidden}
.ex-header{padding:20px 24px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.ex-title{font-size:17px;font-weight:700}
.ex-body{padding:24px}
.ex-question{font-size:16px;font-weight:600;margin-bottom:20px;line-height:1.5}
.ex-options{display:flex;flex-direction:column;gap:10px}
.ex-option{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid var(--br);
  border-radius:var(--r2);cursor:pointer;transition:all .15s;background:var(--white)}
.ex-option:hover{border-color:var(--pm);background:var(--pl)}
.ex-option.selected{border-color:var(--p);background:var(--pl)}
.ex-option.correct{border-color:var(--g);background:var(--gl)}
.ex-option.wrong{border-color:var(--pk);background:var(--pkl)}
.ex-option-letter{width:32px;height:32px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ex-option.selected .ex-option-letter{background:var(--p);color:#fff}
.ex-option.correct .ex-option-letter{background:var(--g);color:#fff}
.ex-option.wrong .ex-option-letter{background:var(--pk);color:#fff}
.ex-footer{padding:16px 24px;border-top:1px solid var(--br);display:flex;
  align-items:center;justify-content:space-between;background:var(--bg)}
.ex-feedback{padding:14px 16px;border-radius:var(--r2);font-size:14px;font-weight:600;margin-top:16px}
.ex-feedback.ok{background:var(--gl);color:var(--g2);border-left:4px solid var(--g)}
.ex-feedback.ko{background:var(--pkl);color:#9B1239;border-left:4px solid var(--pk)}
.ex-timer{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--pk)}
.vf-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.vf-btn{padding:20px;font-size:18px;font-weight:700;border-radius:var(--r);
  border:2px solid var(--br);background:var(--white);cursor:pointer;transition:all .15s}
.vf-btn:hover{border-color:var(--pm);background:var(--pl)}
.vf-btn.selected{border-color:var(--p);background:var(--pl);color:var(--p)}
.vf-btn.correct{border-color:var(--g);background:var(--gl);color:var(--g2)}
.vf-btn.wrong{border-color:var(--pk);background:var(--pkl);color:#9B1239}
.drag-container{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.drag-zone{min-height:80px;border:2px dashed var(--br2);border-radius:var(--r2);padding:12px;
  display:flex;flex-direction:column;gap:8px}
.drag-zone.over{border-color:var(--p);background:var(--pl)}
.drag-item{padding:10px 14px;background:var(--pl);border:1.5px solid var(--pm);
  border-radius:var(--r2);cursor:grab;font-size:14px;font-weight:600;color:var(--p)}
.drag-item:active{cursor:grabbing;opacity:.8}
.fill-input{width:100%;padding:12px 16px;border:2px solid var(--br);border-radius:var(--r2);
  font-size:16px;font-weight:600;text-align:center}
.fill-input:focus{border-color:var(--p)}
.fill-input.correct{border-color:var(--g);background:var(--gl);color:var(--g2)}
.fill-input.wrong{border-color:var(--pk);background:var(--pkl);color:#9B1239}

/* ================================================================
   MATIÈRES HUB
   ================================================================ */
.matiere-hero{border-radius:var(--r);padding:28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.matiere-hero::before{content:'';position:absolute;top:-20px;right:-20px;width:140px;height:140px;
  border-radius:50%;background:rgba(255,255,255,.12)}
.matiere-hero::after{content:'';position:absolute;bottom:-40px;right:40px;width:100px;height:100px;
  border-radius:50%;background:rgba(255,255,255,.08)}
.matiere-hero-title{font-size:26px;font-weight:800;position:relative;z-index:1}
.matiere-hero-sub{font-size:14px;opacity:.85;margin-top:6px;position:relative;z-index:1}
.matiere-hero-stats{display:flex;gap:24px;margin-top:20px;position:relative;z-index:1}
.matiere-hero-stat-val{font-size:22px;font-weight:800}
.matiere-hero-stat-lbl{font-size:11px;opacity:.8}

/* ================================================================
   EXERCICE LIST ITEM
   ================================================================ */
.ex-list-item{display:flex;align-items:center;gap:14px;padding:15px 16px;
  background:var(--white);border:1px solid var(--br);border-radius:var(--r2);
  cursor:pointer;transition:all .15s}
.ex-list-item:hover{border-color:var(--pm);box-shadow:var(--sh);transform:translateY(-1px)}
.ex-list-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.ex-list-info{flex:1}
.ex-list-name{font-size:14px;font-weight:700}
.ex-list-desc{font-size:12px;color:var(--t3);margin-top:2px}
.ex-list-meta{display:flex;align-items:center;gap:8px}
.ex-list-status{width:24px;height:24px;border-radius:50%;border:2px solid var(--br);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff}
.ex-list-status.done{background:var(--g);border-color:var(--g)}
.ex-list-status.progress{background:var(--a);border-color:var(--a)}

/* ================================================================
   PLANNING
   ================================================================ */
.planning-week{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.planning-col-head{padding:8px;text-align:center;font-size:11px;font-weight:700;
  text-transform:uppercase;color:var(--t3);letter-spacing:.5px}
.planning-col-head.today{color:var(--p);background:var(--pl);border-radius:var(--r3)}
.planning-slot{background:var(--pl);border-left:3px solid var(--p);border-radius:var(--r3);
  padding:8px 10px;margin-bottom:6px;font-size:12px}
.planning-slot .ptime{font-weight:700;color:var(--p)}
.planning-slot .pinfo{color:var(--t2);margin-top:2px}
.planning-slot.g-slot{background:var(--gl);border-color:var(--g)}
.planning-slot.g-slot .ptime{color:var(--g2)}
.planning-slot.a-slot{background:var(--al);border-color:var(--a)}
.planning-slot.a-slot .ptime{color:#92400E}
.planning-slot.pk-slot{background:var(--pkl);border-color:var(--pk)}
.planning-slot.pk-slot .ptime{color:#9B1239}

/* ================================================================
   GAMIFICATION
   ================================================================ */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
  border-radius:var(--r2);border:1.5px solid var(--br);text-align:center;transition:all .15s}
.badge-item.earned{border-color:var(--am);background:var(--al)}
.badge-item.locked{opacity:.4;filter:grayscale(1)}
.badge-emoji{font-size:28px}
.badge-name{font-size:11px;font-weight:700;color:var(--t2)}
.streak-flames{display:flex;gap:4px;justify-content:center;margin:8px 0}
.streak-day{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;font-size:11px}
.streak-day.ok{background:var(--g);color:#fff}
.streak-day.today{background:var(--pl);color:var(--p);border:2px solid var(--p)}
.streak-day.miss{background:var(--bg);color:var(--t4)}

/* ================================================================
   GRAPHIQUE SVG SIMPLE
   ================================================================ */
.chart-wrap{width:100%;overflow:hidden}
.chart-bar{fill:var(--p);rx:4;ry:4;cursor:pointer;transition:opacity .15s}
.chart-bar:hover{opacity:.8}
.chart-label{font-size:11px;fill:var(--t3);font-family:var(--fw)}
.chart-val{font-size:11px;fill:var(--t2);font-weight:700;font-family:var(--fw)}

/* ================================================================
   NOTIFICATIONS TOAST
   ================================================================ */
#toast-zone{position:fixed;top:20px;right:20px;z-index:9999;display:flex;
  flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;
  box-shadow:var(--sh2);pointer-events:none;animation:slideIn .3s ease;max-width:320px}
.toast-xp{background:var(--al);color:#92400E}
.toast-success{background:var(--gl);color:var(--g2)}
.toast-error{background:var(--pkl);color:#9B1239}
.toast-info{background:var(--pl);color:var(--p)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media(max-width:1024px){
  :root{--sidebar:200px}
  .grid4{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  :root{--sidebar:60px}
  .sb-brand-text,.nav-btn>span:not(.nicon),.sb-section,.sb-user-name,.sb-user-role{display:none}
  .main{padding:16px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .planning-week{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- ================================================================
     TOAST ZONE
     ================================================================ -->
<div id="toast-zone"></div>

<!-- ================================================================
     PAGE : LOGIN
     ================================================================ -->
<div id="pg-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-badge">EMR</div>
      <div class="login-brand-text">
        <div class="t1">EMR</div>
        <div class="t2">Effort · Motivation · Réussite</div>
      </div>
    </div>
    <div class="login-h">Bienvenue 👋</div>
    <div class="login-s">Connecte-toi à ton espace personnel</div>
    <div class="form-group"><label>Identifiant</label>
      <input class="form-ctrl" id="l-id" placeholder="Ton identifiant…" />
    </div>
    <div class="form-group"><label>Mot de passe</label>
      <input class="form-ctrl" id="l-pw" type="password" placeholder="••••••" />
    </div>
    <div id="l-err" class="login-err hidden"></div>
    <button class="btn btn-primary btn-full mt16" onclick="doLogin()">Se connecter →</button>
    <div class="login-hint">
      Élèves : louis · emma · nathan · jade · inès  |  Mot de passe : <b>1234</b><br>
      Admin : admin  |  Mot de passe : <b>admin1234</b>
    </div>
  </div>
</div>

<!-- ================================================================

/* ================================================================
   PROG HELPERS
   ================================================================ */
function getProg(uid){ return LS.get('prog')[uid]||{} }
function getUsers(){ return LS.get('users')||[] }
function getUser(id){ return getUsers().find(u=>u.id===id) }
function getPlanning(){ return LS.get('plan')||[] }

function saveProg(uid,data){
  const p=LS.get('prog'); p[uid]=data; LS.set('prog',p);
}
function saveUsers(arr){ LS.set('users',arr) }
function savePlanning(arr){ LS.set('plan',arr) }

function getMatiereScore(uid,m){
  const p=getProg(uid); const mp=p[m]||{};
  return Object.values(mp).filter(v=>v&&v.done).length;
}
function getMatierePct(uid,m){
  const total=BANK[m].length;
  return total?Math.round(getMatiereScore(uid,m)/total*100):0;
}
function getTotalDone(uid){
  return ['maths','francais','histoire','sciences'].reduce((a,m)=>a+getMatiereScore(uid,m),0);
}
function getTotalEx(){
  return Object.values(BANK).reduce((a,b)=>a+b.length,0);
}
function getGlobalPct(uid){
  return Math.round(getTotalDone(uid)/getTotalEx()*100);
}
function getAvgScore(uid){
  const p=getProg(uid); let tot=0,n=0;
  Object.values(p).forEach(mp=>Object.values(mp).forEach(v=>{if(v&&v.score!==undefined){tot+=v.score;n++;}}));
  return n?Math.round(tot/n):0;
}
function getTotalTime(uid){
  const p=getProg(uid); let t=0;
  Object.values(p).forEach(mp=>Object.values(mp).forEach(v=>{if(v&&v.time)t+=v.time;}));
  return t;
}
function checkBadges(user){
  const earned=[];
  BADGES_DEF.forEach(b=>{ try{if(b.cond(user))earned.push(b.id);}catch{} });
  return earned;
}
function fmtTime(sec){
  if(sec<60)return sec+'s';
  const m=Math.floor(sec/60),s=sec%60;
  return m+'min'+(s?s+'s':'');
}
function fmtTimeH(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  if(h>0)return h+'h'+(m?m+'min':'');
  return m+'min';
}

let CU = null; // current user

function doLogin(){
  const id=document.getElementById('l-id').value.trim().toLowerCase();
  const pw=document.getElementById('l-pw').value.trim();
  const u=getUsers().find(u=>u.id===id&&u.pw===pw);
  if(!u){ showErr('l-err','Identifiant ou mot de passe incorrect.'); return; }
  CU=u;
  // streak
  const today=new Date().toDateString();
  if(u.lastLogin!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    const arr=getUsers(); const idx=arr.findIndex(x=>x.id===u.id);
    arr[idx].streak=(u.lastLogin===yesterday)?(u.streak||0)+1:1;
    arr[idx].lastLogin=today;
    saveUsers(arr); CU=arr[idx];
  }
  document.getElementById('pg-login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderApp();
}

function doLogout(){
  CU=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('pg-login').classList.remove('hidden');
  document.getElementById('l-id').value='';
  document.getElementById('l-pw').value='';
}

function showErr(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg; el.classList.remove('hidden');
}

   ================================================================ */
let exState={};

function startEx(mkey,exId){
  const ex=BANK[mkey].find(e=>e.id===exId);
  if(!ex)return;
  exState={mkey,ex,sel:null,done:false,correct:null,timerInt:null,elapsed:0,timerVal:20};
  const ov=document.getElementById('ex-ov');
  ov.classList.remove('hidden');
  renderExRunner();
}

function renderExRunner(){
  const {ex}=exState;
  const box=document.getElementById('ex-box');
  let body='';

  if(ex.type==='qcm'){
    body=`<div class="ex-question">${ex.q}</div>
    <div class="ex-options">
      ${ex.opts.map((o,i)=>`<div class="ex-option" id="eopt-${i}" onclick="selectOpt(${i})">
        <div class="ex-option-letter">${String.fromCharCode(65+i)}</div>
        <div>${o}</div>
      </div>`).join('')}
    </div>`;
  } else if(ex.type==='vf'){
    body=`<div class="ex-question">${ex.q}</div>
    <div class="vf-options">
      <div class="vf-btn" id="vf-true" onclick="selectVF(true)">✅ Vrai</div>
      <div class="vf-btn" id="vf-false" onclick="selectVF(false)">❌ Faux</div>
    </div>`;
  } else if(ex.type==='fill'){
    body=`<div class="ex-question">${ex.q}</div>
    <input class="fill-input" id="fill-ans" placeholder="Ta réponse ici…" onkeydown="if(event.key==='Enter')verifyEx()" />
    <div class="small mt8">💡 Indice : ${ex.hint||'—'}</div>`;
  } else if(ex.type==='drag'){
    exState.dragItems=[...ex.items].sort(()=>Math.random()-.5);
    exState.sorted=[];
    body=`<div class="ex-question">${ex.q}</div>
    <div class="drag-container">
      <div>
        <div class="fw7 fs13 mb8">À classer</div>
        <div class="drag-zone" id="drag-src" ondragover="dragOver(event)" ondrop="dragDrop(event,'src')">
          ${exState.dragItems.map((it,i)=>`<div class="drag-item" draggable="true" id="di-${i}" data-val="${it}" ondragstart="dragStart(event,'${it}')">${it}</div>`).join('')}
        </div>
      </div>
      <div>
        <div class="fw7 fs13 mb8">Mon classement</div>
        <div class="drag-zone" id="drag-dst" ondragover="dragOver(event)" ondrop="dragDrop(event,'dst')"></div>
      </div>
    </div>`;
  }

  const timerHtml=ex.timed?`<div class="ex-timer" id="ex-tmr">⏱ ${exState.timerVal}s</div>`:'';

  box.innerHTML=`
  <div class="modal-head">
    <div>
      <div class="modal-title">${ex.titre}</div>
      <div class="small">${MATIERES_META[exState.mkey].icon} ${MATIERES_META[exState.mkey].label} · +${ex.xp} XP</div>
    </div>
    <button class="modal-close" onclick="closeEx()">✕</button>
  </div>
  <div id="ex-body-inner">${body}</div>
  <div id="ex-feedback-zone"></div>
  <div class="ex-footer">
    ${timerHtml}
    <div style="display:flex;gap:10px;margin-left:auto">
      <button class="btn btn-outline btn-sm" onclick="closeEx()">Fermer</button>
      <button class="btn btn-primary btn-sm" id="ex-verify-btn" onclick="verifyEx()">Vérifier ✓</button>
    </div>
  </div>`;

  if(ex.timed) startTimer();
}

function startTimer(){
  exState.timerVal=20;
  exState.timerInt=setInterval(()=>{
    exState.elapsed++;
    exState.timerVal--;
    const el=document.getElementById('ex-tmr');
    if(el) el.textContent='⏱ '+exState.timerVal+'s';
    if(exState.timerVal<=0){
      clearInterval(exState.timerInt);
      if(!exState.done) verifyEx(true);
    }
  },1000);
}

function selectOpt(i){
  if(exState.done)return;
  exState.sel=i;
  document.querySelectorAll('.ex-option').forEach((el,j)=>{
    el.classList.toggle('selected',j===i);
  });
}

function selectVF(val){
  if(exState.done)return;
  exState.sel=val;
  document.getElementById('vf-true').classList.toggle('selected',val===true);
  document.getElementById('vf-false').classList.toggle('selected',val===false);
}

let dragSrc=null;
function dragStart(e,val){ dragSrc=val; e.dataTransfer.setData('text',val); }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('over'); }
function dragDrop(e,zone){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  const val=e.dataTransfer.getData('text');
  const dst=document.getElementById('drag-dst');
  const src=document.getElementById('drag-src');
  if(zone==='dst'){
    // move to dst
    const item=document.querySelector(`[data-val="${val}"]`);
    if(item){ dst.appendChild(item); exState.sorted.push(val); }
  } else {
    const item=document.querySelector(`[data-val="${val}"]`);
    if(item){ src.appendChild(item); exState.sorted=exState.sorted.filter(x=>x!==val); }
  }
}

function verifyEx(timedOut=false){
  if(exState.done)return;
  const {ex,mkey}=exState;
  clearInterval(exState.timerInt);
  exState.done=true;

  let correct=false, score=0;

  if(ex.type==='qcm'){
    if(exState.sel===null&&!timedOut){ toast('Sélectionne une réponse !','info'); exState.done=false; return; }
    correct=exState.sel===ex.ans;
    if(correct){ document.getElementById('eopt-'+ex.ans).classList.add('correct'); }
    else {
      if(exState.sel!==null) document.getElementById('eopt-'+exState.sel).classList.add('wrong');
      document.getElementById('eopt-'+ex.ans).classList.add('correct');
    }
  } else if(ex.type==='vf'){
    if(exState.sel===null&&!timedOut){ toast('Réponds Vrai ou Faux !','info'); exState.done=false; return; }
    correct=exState.sel===ex.ans;
    document.getElementById('vf-true').classList.toggle('correct',ex.ans===true);
    document.getElementById('vf-false').classList.toggle('correct',ex.ans===false);
    if(!correct){
      document.getElementById(exState.sel?'vf-true':'vf-false').classList.add('wrong');
    }
  } else if(ex.type==='fill'){
    const inp=document.getElementById('fill-ans');
    const ans=(inp?inp.value.trim().toLowerCase():'');
    correct=ans===ex.ans.toLowerCase();
    if(inp){ inp.classList.add(correct?'correct':'wrong'); inp.disabled=true; }
  } else if(ex.type==='drag'){
    const dstItems=[...document.getElementById('drag-dst').querySelectorAll('.drag-item')].map(el=>el.dataset.val);
    correct=JSON.stringify(dstItems)===JSON.stringify(ex.ans);
  }

  score=correct?100:0;
  exState.correct=correct;

  const fb=document.getElementById('ex-feedback-zone');
  const bonusXP=ex.timed&&correct&&exState.timerVal>10?Math.floor(ex.xp*.5):0;
  const totalXP=correct?ex.xp+bonusXP:Math.floor(ex.xp*.1);
  fb.innerHTML=`<div class="ex-feedback ${correct?'ok':'ko'} mt16">
    ${correct?'✅ Bravo ! Bonne réponse !':'❌ '+(timedOut?'Temps écoulé !':`Pas tout à fait !`)}
    ${bonusXP>0?`<span class="pill pill-a" style="margin-left:8px">⚡ Bonus vitesse : +${bonusXP} XP</span>`:''}
    <div class="mt8" style="font-weight:400;font-size:13px">
      ${correct?`Tu gagnes <b>+${totalXP} XP</b> 🎉`:`Tu gagnes quand même <b>+${totalXP} XP</b> pour ta participation.`}
    </div>
  </div>`;

  // save prog
  const progAll=LS.get('prog'); if(!progAll[CU.id])progAll[CU.id]={};
  if(!progAll[CU.id][mkey])progAll[CU.id][mkey]={};
  progAll[CU.id][mkey][ex.id]={done:true,score,time:20-(exState.timerVal||0)+1,ts:Date.now()};
  LS.set('prog',progAll);

  // update user xp
  const users=getUsers(); const idx=users.findIndex(u=>u.id===CU.id);
  users[idx].xp+=totalXP;
  users[idx].niveau=Math.max(1,Math.floor(users[idx].xp/500)+1);
  if(ex.timed&&correct&&bonusXP>0) users[idx].timedBonus=(users[idx].timedBonus||0)+1;
  saveUsers(users); CU=users[idx];

  document.getElementById('ex-verify-btn').disabled=true;
  toast(correct?`✅ +${totalXP} XP gagnés !`:`+${totalXP} XP pour la participation`,correct?'success':'info');

  // check new badge
  const earned=checkBadges(CU);
  const prev=checkBadges({...CU,xp:CU.xp-totalXP});
  const newBadge=earned.find(b=>!prev.includes(b));
  if(newBadge){
    const bd=BADGES_DEF.find(b=>b.id===newBadge);
    if(bd) setTimeout(()=>toast(`🏅 Nouveau badge : ${bd.name} ${bd.emoji}`,'info'),800);
  }
}

function closeEx(){
  clearInterval(exState.timerInt||null);
  document.getElementById('ex-ov').classList.add('hidden');
  // refresh page
  const activeBtn=document.querySelector('.nav-btn.active');
  if(activeBtn){
    const id=activeBtn.id.replace('nb-','');
    go(id);
  }
}

        const col=pct>=70?'var(--g)':pct>=40?'var(--a)':'var(--pk)';
        return `<tr>
          <td><div class="flex items-c gap8">
            <div style="width:28px;height:28px;border-radius:50%;background:${u.color};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">${u.prenom[0]}</div>
            <strong>${u.prenom} ${u.nom}</strong></div></td>
          <td><span class="pill pill-p">${u.groupe}</span></td>
          <td>${u.niveau}</td><td>${u.xp}</td>
          <td>🔥 ${u.streak||0}</td>
          <td><div class="flex items-c gap8">
            <div class="pbar-wrap" style="flex:1;min-width:80px"><div class="pbar-fill" style="width:${pct}%;background:${col}"></div></div>
            <span class="fw7 fs13" style="color:${col}">${pct}%</span>
          </div></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
</div>`;
}

/* ================================================================
   ADMIN — ÉLÈVES
   ================================================================ */
function pgAdminEleves(){
  const eleves=getUsers().filter(u=>u.role==='eleve');
  return `
<div class="page-header flex just-b items-c">
  <div><div class="page-title">👥 Gestion des élèves</div>
  <div class="page-sub">${eleves.length} élèves</div></div>
</div>

<div class="card">
  <table class="data-table">
    <thead><tr><th>Identifiant</th><th>Prénom / Nom</th><th>Groupe</th><th>Niveau / XP</th><th>Progression détaillée</th><th>Actions</th></tr></thead>
    <tbody>
      ${eleves.map(u=>{
        const pct=getGlobalPct(u.id);
        const mats=['maths','francais','histoire','sciences'].map(m=>{
          const mt=MATIERES_META[m];
          const p=getMatierePct(u.id,m);
          return `<div style="display:flex;align-items:center;gap:6px;font-size:12px">
            <span>${mt.icon}</span>
            <div style="width:50px;height:4px;background:var(--br);border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${p}%;background:${mt.color};border-radius:99px"></div>
            </div>
            <span style="font-size:11px;color:var(--t3)">${p}%</span>
          </div>`;
        }).join('');
        return `<tr>
          <td><code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px">${u.id}</code></td>
          <td><strong>${u.prenom} ${u.nom}</strong></td>
          <td><span class="pill pill-p">${u.groupe}</span></td>
          <td>Niv. ${u.niveau} · ${u.xp} XP</td>
          <td><div style="display:flex;flex-direction:column;gap:4px">${mats}</div></td>
          <td><button class="btn btn-danger btn-sm" onclick="resetEleve('${u.id}')">Réinitialiser</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
</div>`;
}

function resetEleve(uid){
  if(!confirm('Réinitialiser toute la progression de cet élève ?'))return;
  const prog=LS.get('prog'); delete prog[uid]; LS.set('prog',prog);
  const users=getUsers(); const idx=users.findIndex(u=>u.id===uid);
  users[idx].xp=0; users[idx].niveau=1; users[idx].streak=0; users[idx].timedBonus=0;
  saveUsers(users);
  toast('Progression réinitialisée.','success');
  go('a-eleves');
}

/* ================================================================
   ADMIN — EXERCICES

<div class="page-header"><div class="page-title">📝 Gestion des exercices</div>
<div class="page-sub">Modifier les titres et descriptions des rituels</div></div>

${['maths','francais','histoire','sciences'].map(m=>{
  const mt=MATIERES_META[m];

    <div class="flex just-b items-c mb12">
      <div class="card-title">${mt.icon} ${mt.label} <span class="pill pill-grey" style="margin-left:8px">${exs.length} exercices</span></div>

    <table class="data-table">
      <thead><tr><th>Titre</th><th>Type</th><th>Niveau</th><th>XP</th><th>Description</th></tr></thead>
      <tbody>
        ${exs.map(ex=>{
          const lvlPill={Facile:'pill-g',Moyen:'pill-a',Difficile:'pill-pk'}[ex.niveau]||'pill-grey';

/* ================================================================
   ADMIN — PLANNING
   ================================================================ */
function pgAdminPlan(){
  const plan=getPlanning();
  const mcolor={'Maths':'pill-p','Français':'pill-pk','Histoire-Géo':'pill-a','Sciences':'pill-b','EPS':'pill-g'};

  return `
<div class="page-header flex just-b items-c">
  <div><div class="page-title">📅 Gestion du planning</div>
  <div class="page-sub">${plan.length} séances planifiées</div></div>
  <button class="btn btn-green" onclick="openAddPlan()">+ Ajouter une séance</button>
</div>

<!-- vue semaine -->
<div class="card mb16">
  <div class="card-title mb12">Vue semaine</div>
  <div class="planning-week">
    ${JOURS_SEM.map(j=>{
      const slots=plan.filter(p=>p.jour===j);
      return `<div>
        <div class="planning-col-head">${j}</div>
        ${slots.map(s=>`<div class="planning-slot">
          <div class="ptime">${s.deb}–${s.fin}</div>
          <div class="pinfo">${s.matiere}</div>
          <div class="pinfo"><span class="pill pill-p" style="font-size:9px">${s.groupe}</span></div>
        </div>`).join('')||'<div class="small" style="padding:8px;color:var(--t4)">—</div>'}
      </div>`;
    }).join('')}
  </div>
</div>

<div class="card">
  <table class="data-table">
    <thead><tr><th>Jour</th><th>Horaire</th><th>Matière</th><th>Lieu</th><th>Groupe</th><th>Professeur</th><th>Actions</th></tr></thead>
    <tbody>
      ${plan.map(s=>`<tr>
        <td><strong>${s.jour}</strong></td>
        <td>${s.deb} – ${s.fin}</td>
        <td><span class="pill ${mcolor[s.matiere]||'pill-grey'}">${s.matiere}</span></td>
        <td>📍 ${s.lieu}</td>
        <td><span class="pill pill-p">${s.groupe}</span></td>
        <td>${s.prof}</td>
        <td><div class="flex gap6">
          <button class="btn btn-outline btn-sm" onclick="openEditPlan('${s.id}')">Modifier</button>
          <button class="btn btn-danger btn-sm" onclick="deletePlan('${s.id}')">Supprimer</button>
        </div></td>
      </tr>`).join('')}
    </tbody>
  </table>
</div>`;
}

function planForm(s){
  const jours=JOURS_SEM.concat(['Samedi','Dimanche']);
  const mats=['Maths','Français','Histoire-Géo','Sciences','EPS','Autre'];
  const grps=['Groupe A','Groupe B','Groupe A + B','Tous'];
  return `
    <div class="form-row">
      <div class="form-group"><label>Jour</label>
        <select class="form-ctrl" id="pj">${jours.map(j=>`<option${s&&s.jour===j?' selected':''}>${j}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Matière</label>
        <select class="form-ctrl" id="pm">${mats.map(m=>`<option${s&&s.matiere===m?' selected':''}>${m}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Début</label><input class="form-ctrl" type="time" id="pd" value="${s?s.deb:'08:00'}"/></div>
      <div class="form-group"><label>Fin</label><input class="form-ctrl" type="time" id="pf" value="${s?s.fin:'09:00'}"/></div>
    </div>
    <div class="form-group"><label>Lieu</label><input class="form-ctrl" id="pl" placeholder="ex: Salle 101, CDI…" value="${s?s.lieu:''}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Groupe</label>
        <select class="form-ctrl" id="pg">${grps.map(g=>`<option${s&&s.groupe===g?' selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Enseignant référent</label><input class="form-ctrl" id="pp" value="${s?s.prof:''}" placeholder="ex: M. Durand"/></div>
    </div>`;
}

function openAddPlan(){
  openModal('Ajouter une séance', planForm(null)+`
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="saveAddPlan()">Ajouter</button>
    </div>`);
}

function saveAddPlan(){
  const plan=getPlanning();
  plan.push({id:'pl'+Date.now(),jour:v('pj'),deb:v('pd'),fin:v('pf'),matiere:v('pm'),lieu:v('pl'),groupe:v('pg'),prof:v('pp')});
  savePlanning(plan); closeModal(); toast('Séance ajoutée','success'); go('a-plan');
}

function openEditPlan(id){
  const s=getPlanning().find(p=>p.id===id);
  openModal('Modifier la séance', planForm(s)+`
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="saveEditPlan('${id}')">Enregistrer</button>
    </div>`);
}

function saveEditPlan(id){
  const plan=getPlanning(); const idx=plan.findIndex(p=>p.id===id);
  plan[idx]={id,jour:v('pj'),deb:v('pd'),fin:v('pf'),matiere:v('pm'),lieu:v('pl'),groupe:v('pg'),prof:v('pp')};
  savePlanning(plan); closeModal(); toast('Séance modifiée','success'); go('a-plan');
}

function deletePlan(id){
  if(!confirm('Supprimer cette séance ?'))return;
  savePlanning(getPlanning().filter(p=>p.id!==id));
  toast('Séance supprimée','info'); go('a-plan');
}

/* ================================================================
   MODAL HELPERS
   ================================================================ */
function openModal(title,body){
  document.getElementById('modal-ttl').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-ov').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal-ov').classList.add('hidden'); }
function closeModalOut(e){ if(e.target===document.getElementById('modal-ov'))closeModal(); }

/* ================================================================
   TOAST
   ================================================================ */
function toast(msg,type='info',dur=3000){
  const zone=document.getElementById('toast-zone');
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.textContent=msg;
  zone.appendChild(el);
  setTimeout(()=>{el.style.animation='fadeOut .3s ease forwards';setTimeout(()=>el.remove(),300);},dur);
}

/* ================================================================
   UTILS
   ================================================================ */
function v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded',()=>{
  initData();
  document.getElementById('l-pw').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
  document.getElementById('l-id').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
});
</script>
</body>
