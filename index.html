<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR v3 - Complete</title>

<style>
:root{
  --green:#1D9E75;
  --purple:#534AB7;
  --pink:#D4537E;
  --bg:#F5F7FB;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:var(--bg);}

header{
  background:linear-gradient(90deg,var(--green),var(--purple),var(--pink));
  color:white;
  text-align:center;
  padding:15px;
}

.hidden{display:none;}

#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  width:320px;
  border-radius:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:10px;
  background:var(--purple);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.container{display:flex;min-height:100vh;}

aside{
  width:220px;
  background:white;
  padding:15px;
}

main{flex:1;padding:20px;}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

/* BADGES */
.badge{
  background:var(--pink);
  color:white;
  padding:5px 10px;
  border-radius:20px;
  display:inline-block;
  margin:3px;
}
</style>
</head>

<body>

<header>
<h2>EMR - Effort Motivation Réussite</h2>
</header>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h3>Connexion</h3>
<input id="u" placeholder="identifiant">
<input id="p" type="password" placeholder="mot de passe">
<button onclick="login()">Connexion</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden container">

<aside>
<h3>Menu</h3>

<button onclick="show('dash')">Dashboard</button>
<button onclick="load('maths')">Maths</button>
<button onclick="load('francais')">Français</button>
<button onclick="load('histoire')">Histoire</button>
<button onclick="load('sciences')">Sciences</button>
<button onclick="show('planning')">Planning</button>

<button onclick="logout()">Déconnexion</button>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dash">

<div class="card">
<h2 id="name"></h2>
<p>XP: <span id="xp"></span></p>
<p>Niveau: <span id="level"></span></p>
</div>

<div class="card">
<h3>Badges</h3>
<div id="badges"></div>
</div>

</div>

<!-- EXERCICES -->
<div id="subject" class="card hidden"></div>

<!-- PLANNING -->
<div id="planning" class="hidden">

<div class="card">
<h3>Planning de révision</h3>

<div id="planningList"></div>

</div>

<div id="adminPanel" class="card hidden">
<h3>Admin - ajouter séance</h3>

<input id="day" placeholder="Jour">
<input id="time" placeholder="Heure">
<input id="place" placeholder="Lieu">
<input id="group" placeholder="Groupe A/B">
<button onclick="addSession()">Ajouter</button>

</div>

</div>

</main>
</div>

<script>

/* ================= DATA ================= */

const KEY="EMR_V3";

if(!localStorage.getItem(KEY)){
localStorage.setItem(KEY,JSON.stringify({
users:[
{u:"admin",p:"admin1234",name:"Admin",role:"admin",xp:0,group:"A"},
{u:"louis",p:"1234",name:"Louis",xp:0,group:"A"},
{u:"emma",p:"1234",name:"Emma",xp:0,group:"A"},
{u:"nathan",p:"1234",name:"Nathan",xp:0,group:"B"},
{u:"jade",p:"1234",name:"Jade",xp:0,group:"B"},
{u:"ines",p:"1234",name:"Inès",xp:0,group:"A"}
],
exercises:{
maths:[
{q:"5 x 5 ?",a:["10","20","25","30"],r:2},
{q:"12 - 7 ?",a:["5","6","4","3"],r:0}
],
francais:[
{q:"verbe dans 'je mange' ?",a:["mange","je","pomme","une"],r:0}
],
histoire:[
{q:"1789 ?",a:["Révolution","WW1","Rome","2000"],r:0}
],
sciences:[
{q:"eau bout à ?",a:["100°C","50°C","0°C","200°C"],r:0}
]
},
progress:{},
planning:[]
}));
}

let data=JSON.parse(localStorage.getItem(KEY));
let user=null;
let subject=null;
let index=0;

/* ================= LOGIN ================= */

function login(){

let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

user=data.users.find(x=>x.u===u && x.p===p);

if(!user){alert("Erreur");return;}

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

render();
renderPlanning();
}

/* ================= DASHBOARD ================= */

function show(id){

document.querySelectorAll("main > div").forEach(d=>d.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

if(id==="planning") renderPlanning();

}

function render(){

document.getElementById("name").innerText=user.name;

document.getElementById("xp").innerText=user.xp;

document.getElementById("level").innerText=Math.floor(user.xp/100)+1;

renderBadges();

}

/* ================= BADGES ================= */

function renderBadges(){

let b=[];

if(user.xp>=20) b.push("Débutant");
if(user.xp>=50) b.push("Motivé");
if(user.xp>=100) b.push("Sérieux");
if(user.xp>=200) b.push("Expert");

document.getElementById("badges").innerHTML=
b.length?b.map(x=>`<span class="badge">${x}</span>`).join(""):"Aucun badge";

}

/* ================= EXERCICES ================= */

function load(s){

subject=s;
index=0;

document.getElementById("dash").classList.add("hidden");
document.getElementById("subject").classList.remove("hidden");

renderExercise();

}

function renderExercise(){

let ex=data.exercises[subject][index];

if(!ex){
document.getElementById("subject").innerHTML="<h3>Terminé ✔</h3>";
return;
}

document.getElementById("subject").innerHTML=`
<h2>${subject.toUpperCase()}</h2>
<p><b>${ex.q}</b></p>

${ex.a.map((x,i)=>
`<button onclick="answer(${i})">${x}</button><br><br>`
).join("")}
`;

}

function answer(i){

let ex=data.exercises[subject][index];

if(i===ex.r){
user.xp+=10;
alert("+10 XP");
}else{
alert("Faux");
}

index++;

save();
render();
renderExercise();

}

/* ================= SAVE ================= */

function save(){

let u=data.users.find(x=>x.u===user.u);
u.xp=user.xp;

localStorage.setItem(KEY,JSON.stringify(data));

}

/* ================= PLANNING ================= */

function renderPlanning(){

let list=document.getElementById("planningList");

let sessions=data.planning.filter(p=>p.group===user.group || user.role==="admin");

list.innerHTML=sessions.map(s=>
`<div class="card">
<b>${s.day}</b> - ${s.time}<br>
${s.place} | Groupe ${s.group}
</div>`
).join("");

if(user.role==="admin"){
document.getElementById("adminPanel").classList.remove("hidden");
}

}

function addSession(){

data.planning.push({
day:day.value,
time:time.value,
place:place.value,
group:group.value
});

localStorage.setItem(KEY,JSON.stringify(data));

renderPlanning();

}

/* ================= LOGOUT ================= */

function logout(){
location.reload();
}

</script>

</body>
</html>
