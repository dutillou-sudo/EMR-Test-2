<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR - Effort Motivation Réussite</title>

<style>
:root{
  --vert:#1D9E75;
  --violet:#534AB7;
  --rose:#D4537E;
  --gris:#f5f7fb;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--gris);
}

header{
  background:linear-gradient(90deg,var(--vert),var(--violet),var(--rose));
  color:white;
  padding:15px;
  text-align:center;
}

.container{ padding:20px; }

.hidden{display:none;}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--violet);
  color:white;
  cursor:pointer;
}

button:hover{opacity:0.9;}

.progress-bar{
  height:12px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:100%;
  background:var(--vert);
}
</style>
</head>

<body>

<header>
<h1>EMR - Effort · Motivation · Réussite</h1>
</header>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h3>Connexion</h3>
    <input id="username" placeholder="Identifiant"><br><br>
    <input id="password" type="password" placeholder="Mot de passe"><br><br>
    <button onclick="login()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden container">

  <div class="card">
    <button onclick="showView('revision')">Accueil Révision</button>
    <button onclick="showView('dashboard')">Mes exercices</button>
    <button onclick="logout()">Déconnexion</button>
  </div>

  <!-- ================= REVISION PAGE ================= -->
  <div id="revision" class="view">

    <div class="card">
      <h2>📚 Page de révision</h2>
      <p>Choisis une matière pour commencer tes exercices</p>
    </div>

    <div class="card">
      <h3>Mathématiques</h3>
      <button onclick="showView('dashboard')">Commencer</button>
    </div>

    <div class="card">
      <h3>Français</h3>
      <button onclick="showView('dashboard')">Commencer</button>
    </div>

    <div class="card">
      <h3>Histoire-Géographie</h3>
      <button onclick="showView('dashboard')">Commencer</button>
    </div>

    <div class="card">
      <h3>Sciences</h3>
      <button onclick="showView('dashboard')">Commencer</button>
    </div>

  </div>

  <!-- ================= DASHBOARD ================= -->
  <div id="dashboard" class="view hidden">

    <div class="card">
      <h2 id="welcome"></h2>

      <div class="progress-bar">
        <div id="progressGlobal" class="progress"></div>
      </div>

      <p id="progressText"></p>
    </div>

    <div id="categories"></div>

  </div>

</div>

<script>
/* ================= DATA ================= */
let data = JSON.parse(localStorage.getItem("EMR_data"));

if(!data){
  data = {
    users:[
      {id:1, username:"admin", password:"admin1234", role:"admin"},
      {id:2, username:"louis", password:"1234", firstName:"Louis"},
      {id:3, username:"emma", password:"1234", firstName:"Emma"},
      {id:4, username:"nathan", password:"1234", firstName:"Nathan"},
      {id:5, username:"jade", password:"1234", firstName:"Jade"},
      {id:6, username:"ines", password:"1234", firstName:"Inès"},
    ],
    exercises:{
      maths:[
        {id:"m1", title:"Calcul mental", desc:"Entraînement rapide"},
        {id:"m2", title:"Fractions", desc:"Opérations"},
        {id:"m3", title:"Équations", desc:"Résolution"}
      ],
      francais:[
        {id:"f1", title:"Grammaire", desc:"Analyse"},
        {id:"f2", title:"Conjugaison", desc:"Temps verbaux"},
        {id:"f3", title:"Dictée", desc:"Orthographe"}
      ],
      histoire:[
        {id:"h1", title:"Révolution", desc:"1789"},
        {id:"h2", title:"Guerres", desc:"XXe siècle"},
        {id:"h3", title:"Europe", desc:"UE"}
      ],
      sciences:[
        {id:"s1", title:"Électricité", desc:"Circuits"},
        {id:"s2", title:"Atomes", desc:"Structure"},
        {id:"s3", title:"Énergie", desc:"Transformations"}
      ]
    },
    progress:{}
  };

  localStorage.setItem("EMR_data", JSON.stringify(data));
}

let currentUser;

/* ================= LOGIN ================= */
function login(){
  const u=document.getElementById("username").value;
  const p=document.getElementById("password").value;

  const user=data.users.find(x=>x.username===u && x.password===p);

  if(!user){
    alert("Erreur");
    return;
  }

  currentUser=user;
  localStorage.setItem("EMR_user",JSON.stringify(user));

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  showView("revision"); // 🔥 CHANGEMENT ICI
  render();
}

/* ================= NAV ================= */
function showView(v){
  document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));
  document.getElementById(v).classList.remove("hidden");
}

/* ================= DASHBOARD ================= */
function render(){
  document.getElementById("welcome").innerText =
    "Bienvenue " + currentUser.firstName;

  let total=0, done=0;

  Object.values(data.exercises).forEach(cat=>{
    cat.forEach(e=>{
      total++;
      if(data.progress[currentUser.username]?.[e.id]) done++;
    });
  });

  let percent=Math.round((done/total)*100)||0;

  document.getElementById("progressGlobal").style.width=percent+"%";
  document.getElementById("progressText").innerText=percent+"% complété";

  renderCategories();
}

/* ================= EXERCICES ================= */
function toggle(id){
  if(!data.progress[currentUser.username])
    data.progress[currentUser.username]={};

  data.progress[currentUser.username][id]=
    !data.progress[currentUser.username][id];

  localStorage.setItem("EMR_data",JSON.stringify(data));
  render();
}

function renderCategories(){
  const c=document.getElementById("categories");
  c.innerHTML="";

  for(let cat in data.exercises){
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML="<h3>"+cat.toUpperCase()+"</h3>";

    data.exercises[cat].forEach(e=>{
      let done=data.progress[currentUser.username]?.[e.id];

      let ex=document.createElement("div");
      ex.innerHTML=`
        <p><b>${e.title}</b> - ${e.desc}</p>
        <button onclick="toggle('${e.id}')">
          ${done?"Complété":"Commencer"}
        </button>
      `;
      div.appendChild(ex);
    });

    c.appendChild(div);
  }
}

/* ================= LOGOUT ================= */
function logout(){
  localStorage.removeItem("EMR_user");
  location.reload();
}

/* auto login */
if(localStorage.getItem("EMR_user")){
  currentUser=JSON.parse(localStorage.getItem("EMR_user"));
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  showView("revision");
  render();
}
</script>

</body>
</html>
