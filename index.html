<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR PRO</title>

<style>
:root{
  --g:#1D9E75;
  --p:#534AB7;
  --r:#D4537E;
  --bg:#F4F6FA;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--g),var(--p),var(--r));
color:white;
text-align:center;
padding:14px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:20px;
width:320px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:var(--p);
color:white;
cursor:pointer;
}

/* APP */
.hidden{display:none;}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
aside{
width:240px;
background:white;
padding:15px;
box-shadow:2px 0 10px rgba(0,0,0,.05);
}

aside button{
margin-top:8px;
background:var(--p);
}

/* MAIN */
main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARDS */
.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* BADGE */
.badge{
background:var(--r);
color:white;
padding:5px 10px;
border-radius:20px;
display:inline-block;
margin:3px;
font-size:12px;
}

/* PROGRESS */
.bar{
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:var(--g);
transition:.3s;
}
</style>
</head>

<body>

<header>
<h2>EMR PRO</h2>
</header>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h3>Connexion</h3>
<input id="u" placeholder="identifiant">
<input id="p" type="password" placeholder="mot de passe">
<button onclick="login()">Connexion</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden app">

<aside>
<h3>Menu</h3>

<button onclick="nav('dash')">Dashboard</button>
<button onclick="load('maths')">Maths</button>
<button onclick="load('francais')">Français</button>
<button onclick="load('histoire')">Histoire</button>
<button onclick="load('sciences')">Sciences</button>
<button onclick="nav('planning')">Planning</button>
<button onclick="logout()">Déconnexion</button>

</aside>

<main>

<!-- DASHBOARD -->
<div id="dash">

<div class="card">
<h2 id="name"></h2>
<p>XP: <span id="xp"></span></p>
<p>Niveau: <span id="lvl"></span></p>

<div class="bar">
<div id="prog" class="fill"></div>
</div>
</div>

<div class="card">
<h3>Badges</h3>
<div id="badges"></div>
</div>

</div>

<!-- EXERCICES -->
<div id="ex" class="card hidden"></div>

<!-- PLANNING -->
<div id="plan" class="hidden">

<div class="card">
<h3>Planning</h3>
<div id="list"></div>
</div>

<div id="adminPlan" class="card hidden">
<h3>Admin planning</h3>
<input id="d" placeholder="Jour">
<input id="t" placeholder="Heure">
<input id="l" placeholder="Lieu">
<input id="g" placeholder="Groupe">
<button onclick="add()">Ajouter</button>
</div>

</div>

</main>
</div>

<script>

/* ================= DATA ================= */

const KEY="EMRPRO";

if(!localStorage.getItem(KEY)){
localStorage.setItem(KEY,JSON.stringify({
users:[
{u:"admin",p:"admin1234",name:"Admin",role:"admin",xp:0,group:"A"},
{u:"louis",p:"1234",name:"Louis",xp:0,group:"A"},
{u:"emma",p:"1234",name:"Emma",xp:0,group:"A"},
{u:"nathan",p:"1234",name:"Nathan",xp:0,group:"B"},
{u:"jade",p:"1234",name:"Jade",xp:0,group:"B"},
{u:"ines",p:"1234",name:"Inès",xp:0,group:"A"}
],
exercises:{
maths:[
{q:"6 x 6 ?",a:["30","36","40","24"],r:1},
{q:"9-4 ?",a:["5","4","3","6"],r:0}
],
francais:[
{q:"verbe 'je parle' ?",a:["parle","je","tu","ma"],r:0}
],
histoire:[
{q:"1789 ?",a:["Révolution","Empire","WW2","Rome"],r:0}
],
sciences:[
{q:"eau bout ?",a:["100°C","50°C","0°C","20°C"],r:0}
]
},
progress:{},
planning:[]
}));
}

let data=JSON.parse(localStorage.getItem(KEY));
let user=null;
let subj=null;
let i=0;

/* ================= LOGIN ================= */

function login(){

let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

user=data.users.find(x=>x.u===u && x.p===p);

if(!user){alert("Erreur");return;}

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

render();
renderPlan();

}

/* ================= NAV ================= */

function nav(x){

document.querySelectorAll("main > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(x).classList.remove("hidden");

if(x==="plan") renderPlan();

}

/* ================= DASH ================= */

function render(){

document.getElementById("name").innerText=user.name;

document.getElementById("xp").innerText=user.xp;

let lvl=Math.floor(user.xp/100)+1;

document.getElementById("lvl").innerText=lvl;

document.getElementById("prog").style.width=(user.xp%100)+"%";

renderBadges();

}

/* ================= BADGES ================= */

function renderBadges(){

let b=[];

if(user.xp>=20) b.push("Débutant");
if(user.xp>=50) b.push("Motivé");
if(user.xp>=100) b.push("Sérieux");
if(user.xp>=200) b.push("Expert");

document.getElementById("badges").innerHTML=
b.length?b.map(x=>`<span class="badge">${x}</span>`).join(""):"Aucun badge";

}

/* ================= EX ================= */

function load(s){

subj=s;
i=0;

nav("ex");
renderEx();

}

function renderEx(){

let e=data.exercises[subj][i];

if(!e){
document.getElementById("ex").innerHTML="<h3>Terminé ✔</h3>";
return;
}

document.getElementById("ex").innerHTML=`
<h2>${subj.toUpperCase()}</h2>
<p><b>${e.q}</b></p>

${e.a.map((x,j)=>
`<button onclick="ans(${j})">${x}</button><br><br>`
).join("")}
`;

}

function ans(j){

let e=data.exercises[subj][i];

if(j===e.r){
user.xp+=10;
alert("+10 XP");
}else alert("Faux");

i++;

save();
render();
renderEx();

}

/* ================= SAVE ================= */

function save(){

let u=data.users.find(x=>x.u===user.u);
u.xp=user.xp;

localStorage.setItem(KEY,JSON.stringify(data));

}

/* ================= PLANNING ================= */

function renderPlan(){

let list=data.planning.filter(p=>p.group===user.group || user.role==="admin");

document.getElementById("list").innerHTML=
list.map(p=>`
<div class="card">
<b>${p.day}</b> - ${p.time}<br>
${p.place} | ${p.group}
</div>
`).join("");

if(user.role==="admin")
document.getElementById("adminPlan").classList.remove("hidden");

}

function add(){

data.planning.push({
day:d.value,
time:t.value,
place:l.value,
group:g.value
});

localStorage.setItem(KEY,JSON.stringify(data));

renderPlan();

}

/* ================= LOGOUT ================= */

function logout(){
location.reload();
}

</script>

</body>
</html>
