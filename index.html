<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR - Effort Motivation Réussite</title>

<style>
/* =======================
   CHARTE GRAPHIQUE
======================= */
:root{
  --vert:#1D9E75;
  --violet:#534AB7;
  --rose:#D4537E;
  --gris:#f5f7fb;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--gris);
  color:#333;
}

header{
  background:linear-gradient(90deg,var(--vert),var(--violet),var(--rose));
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
}

/* =======================
   LOGIN
======================= */
#loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:90vh;
}

.login-box{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  width:300px;
}

input, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ddd;
}

button{
  background:var(--violet);
  color:white;
  cursor:pointer;
  border:none;
}

button:hover{
  opacity:0.9;
}

/* =======================
   DASHBOARD
======================= */
.hidden{display:none;}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.progress-bar{
  height:12px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:100%;
  background:var(--vert);
}

/* catégories */
.category{
  margin-top:15px;
}

.exercise{
  border:1px solid #eee;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* admin table */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border:1px solid #ddd;
  padding:8px;
}

.small{
  font-size:12px;
  color:#666;
}

.nav{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.nav button{
  flex:1;
}

</style>
</head>

<body>

<header>
  <h1>EMR - Effort · Motivation · Réussite</h1>
</header>

<!-- =======================
     LOGIN PAGE
======================= -->
<div id="loginPage">
  <div class="login-box">
    <h3>Connexion</h3>
    <input id="username" placeholder="Identifiant">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </div>
</div>

<!-- =======================
     APP
======================= -->
<div id="app" class="hidden container">

  <div class="nav">
    <button onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('planning')">Planning</button>
    <button id="adminBtn" class="hidden" onclick="showView('admin')">Admin</button>
    <button onclick="logout()">Déconnexion</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="view">

    <div class="card">
      <h2 id="welcome"></h2>
      <p id="levelInfo"></p>

      <div class="progress-bar">
        <div id="progressGlobal" class="progress"></div>
      </div>
      <p id="progressText"></p>
    </div>

    <div class="card">
      <h3>📅 Prochaines séances</h3>
      <div id="sessions"></div>
    </div>

    <div id="categories"></div>
  </div>

  <!-- PLANNING -->
  <div id="planning" class="view hidden">
    <div class="card">
      <h2>Planning de révision</h2>
      <div id="planningList"></div>
    </div>

    <div id="planningAdmin" class="card hidden">
      <h3>Gestion planning (admin)</h3>
      <input id="day" placeholder="Jour">
      <input id="start" placeholder="Début">
      <input id="end" placeholder="Fin">
      <input id="place" placeholder="Lieu">
      <input id="groups" placeholder="Groupes (A,B)">
      <button onclick="addSession()">Ajouter</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="view hidden">
    <div class="card">
      <h2>Administration</h2>
      <h3>Élèves</h3>
      <div id="students"></div>
    </div>

    <div class="card">
      <h3>Modifier exercices</h3>
      <div id="editExercises"></div>
    </div>
  </div>

</div>

<script>
/* =======================
   INITIALISATION DATA
======================= */
let data = JSON.parse(localStorage.getItem("EMR_data"));

if(!data){
  data = {
    users:[
      {id:1, username:"admin", password:"admin1234", role:"admin"},

      {id:2, username:"louis", password:"1234", firstName:"Louis", group:"A", level:3},
      {id:3, username:"emma", password:"1234", firstName:"Emma", group:"A", level:3},
      {id:4, username:"nathan", password:"1234", firstName:"Nathan", group:"B", level:3},
      {id:5, username:"jade", password:"1234", firstName:"Jade", group:"B", level:3},
      {id:6, username:"ines", password:"1234", firstName:"Inès", group:"A", level:3},
    ],

    exercises:{
      maths:[
        {id:"m1", title:"Calcul mental", desc:"Entraînement rapide"},
        {id:"m2", title:"Fractions", desc:"Opérations sur fractions"},
        {id:"m3", title:"Équations", desc:"Résolution simple"}
      ],
      francais:[
        {id:"f1", title:"Grammaire", desc:"Analyse de phrases"},
        {id:"f2", title:"Conjugaison", desc:"Temps verbaux"},
        {id:"f3", title:"Dictée", desc:"Orthographe"}
      ],
      histoire:[
        {id:"h1", title:"Révolution", desc:"1789"},
        {id:"h2", title:"Guerres mondiales", desc:"XXe siècle"},
        {id:"h3", title:"Europe", desc:"Construction européenne"}
      ],
      sciences:[
        {id:"s1", title:"Électricité", desc:"Circuits"},
        {id:"s2", title:"Atomes", desc:"Structure"},
        {id:"s3", title:"Énergie", desc:"Transformations"}
      ]
    },

    progress:{},
    planning:[]
  };
  localStorage.setItem("EMR_data", JSON.stringify(data));
}

/* =======================
   SESSION
======================= */
let currentUser = JSON.parse(localStorage.getItem("EMR_user"));

function login(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  const user = data.users.find(x => x.username===u && x.password===p);

  if(!user){
    alert("Erreur de connexion");
    return;
  }

  currentUser = user;
  localStorage.setItem("EMR_user", JSON.stringify(user));

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(user.role==="admin"){
    document.getElementById("adminBtn").classList.remove("hidden");
  }

  render();
}

function logout(){
  localStorage.removeItem("EMR_user");
  location.reload();
}

/* =======================
   NAVIGATION
======================= */
function showView(v){
  document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));
  document.getElementById(v).classList.remove("hidden");
}

/* =======================
   DASHBOARD
======================= */
function render(){

  showView("dashboard");

  document.getElementById("welcome").innerText =
    "Bienvenue " + (currentUser.firstName || "Admin");

  const total = getAllExercises().length;
  const done = getDoneCount();

  const percent = Math.round((done/total)*100);

  document.getElementById("progressGlobal").style.width = percent+"%";
  document.getElementById("progressText").innerText =
    percent + "% complété";

  document.getElementById("levelInfo").innerText =
    "Niveau: " + (currentUser.level || "Admin") + " | XP: " + done*10;

  renderCategories();
  renderSessions();
}

/* =======================
   EXERCICES
======================= */
function getAllExercises(){
  let arr=[];
  Object.values(data.exercises).forEach(cat=>{
    cat.forEach(e=>arr.push(e.id));
  });
  return arr;
}

function getDoneCount(){
  if(!data.progress[currentUser.username]) return 0;
  return Object.values(data.progress[currentUser.username]).filter(Boolean).length;
}

function toggleExercise(id){
  if(!data.progress[currentUser.username])
    data.progress[currentUser.username]={};

  data.progress[currentUser.username][id] =
    !data.progress[currentUser.username][id];

  save();
  render();
}

/* =======================
   CATEGORIES
======================= */
function renderCategories(){
  const container = document.getElementById("categories");
  container.innerHTML="";

  for(let cat in data.exercises){

    const div = document.createElement("div");
    div.className="card category";

    div.innerHTML="<h3>"+cat.toUpperCase()+"</h3>";

    data.exercises[cat].forEach(e=>{
      const done = data.progress[currentUser.username]?.[e.id];

      const ex = document.createElement("div");
      ex.className="exercise";

      ex.innerHTML=`
        <div>
          <b>${e.title}</b><br>
          <span class="small">${e.desc}</span>
        </div>
        <button onclick="toggleExercise('${e.id}')">
          ${done ? "Complété" : "Commencer"}
        </button>
      `;

      div.appendChild(ex);
    });

    container.appendChild(div);
  }
}

/* =======================
   PLANNING
======================= */
function renderSessions(){
  const div = document.getElementById("sessions");
  div.innerHTML="";

  const sessions = data.planning.filter(p =>
    p.groups.includes(currentUser.group)
  );

  if(sessions.length===0){
    div.innerHTML="<p class='small'>Aucune séance prévue</p>";
    return;
  }

  sessions.forEach(s=>{
    const el = document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <b>${s.day}</b> ${s.start}-${s.end}<br>
      ${s.place}
    `;
    div.appendChild(el);
  });
}

/* =======================
   ADMIN
======================= */
function renderAdmin(){

  document.getElementById("students").innerHTML =
    data.users.filter(u=>u.role==="student")
    .map(u=>{
      const done = data.progress[u.username] ?
        Object.values(data.progress[u.username]).filter(Boolean).length : 0;

      const total = getAllExercises().length;

      return `
        <div class="card">
          <b>${u.firstName}</b> (${u.username})<br>
          Progression: ${Math.round(done/total*100)}%<br>
          <button onclick="resetProgress('${u.username}')">Réinitialiser</button>
        </div>
      `;
    }).join("");

  renderEditExercises();
}

function resetProgress(username){
  data.progress[username]={};
  save();
  renderAdmin();
}

/* =======================
   EDIT EXERCISES
======================= */
function renderEditExercises(){
  const div = document.getElementById("editExercises");
  div.innerHTML="";

  for(let cat in data.exercises){
    data.exercises[cat].forEach(e=>{
      div.innerHTML+=`
        <div class="card">
          <b>${cat} - ${e.id}</b>
          <input value="${e.title}" onchange="e.title=this.value">
          <input value="${e.desc}" onchange="e.desc=this.value">
        </div>
      `;
    });
  }
}

/* =======================
   PLANNING ADMIN
======================= */
function addSession(){
  data.planning.push({
    id:Date.now(),
    day:day.value,
    start:start.value,
    end:end.value,
    place:place.value,
    groups:groups.value.split(",")
  });

  save();
  renderPlanning();
}

function renderPlanning(){
  const div = document.getElementById("planningList");
  div.innerHTML = data.planning.map(p=>`
    <div class="card">
      <b>${p.day}</b> ${p.start}-${p.end}<br>
      ${p.place}
    </div>
  `).join("");
}

/* =======================
   SAVE
======================= */
function save(){
  localStorage.setItem("EMR_data", JSON.stringify(data));
}

/* =======================
   VIEW CONTROL
======================= */
function showView(v){
  document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));
  document.getElementById(v).classList.remove("hidden");

  if(v==="admin") renderAdmin();
  if(v==="planning") renderPlanning();
}

/* init */
if(currentUser){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(currentUser.role==="admin"){
    document.getElementById("adminBtn").classList.remove("hidden");
  }

  render();
}
</script>

</body>
</html>
